name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API image metadata
        if: ${{ hashFiles('human_behaviour/Dockerfile.api') != '' }}
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/human-behaviour-api
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        if: ${{ hashFiles('human_behaviour/Dockerfile.api') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./human_behaviour
          file: ./human_behaviour/Dockerfile.api
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Extract frontend image metadata
        if: ${{ hashFiles('human_behaviour/frontend/Dockerfile') != '' }}
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/human-behaviour-frontend
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        if: ${{ hashFiles('human_behaviour/frontend/Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./human_behaviour/frontend
          file: ./human_behaviour/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
