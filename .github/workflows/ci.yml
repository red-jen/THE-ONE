name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: human_behaviour
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: human_behaviour/requirements.api-docker.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.api-docker.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest -q tests

      - name: Python syntax check
        run: python -m py_compile src/interface/api.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: human_behaviour/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: human_behaviour/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Build frontend
        run: npm run build

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./human_behaviour
          file: ./human_behaviour/Dockerfile.api
          push: false
          tags: human-behaviour-api:ci

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./human_behaviour/frontend
          file: ./human_behaviour/frontend/Dockerfile
          push: false
          tags: human-behaviour-frontend:ci
