# Project name keeps volumes/networks consistent: docker compose -p human_behaviour ...
name: human_behaviour

services:
  postgres:
    image: postgres:16-alpine
    container_name: hb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-human_behaviour}
      POSTGRES_USER: ${POSTGRES_USER:-hb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hb_password}
    # Host 5433 avoids conflict with a local PostgreSQL install (common on Windows).
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hb_user} -d ${POSTGRES_DB:-human_behaviour}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.1
    container_name: mlflow-server
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/data/mlflow.db
      - --default-artifact-root
      - file:/mlflow/mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow_db:/mlflow/data
      - mlflow_artifacts:/mlflow/mlruns
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1',5000)); s.close()",
        ]
      interval: 15s
      timeout: 6s
      retries: 6
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: human-behaviour-api
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-hb_user}:${POSTGRES_PASSWORD:-hb_password}@postgres:5432/${POSTGRES_DB:-human_behaviour}
      HB_API_AUTH: ${HB_API_AUTH:-true}
      HB_JWT_SECRET: ${HB_JWT_SECRET:-change-me-in-production}
      HB_API_USERS_JSON: '{"admin":{"password":"admin","role":"admin"},"analyst":{"password":"analyst","role":"analyst"},"viewer":{"password":"viewer","role":"viewer"}}'
      HB_MULTICAM_ROOT: outputs/multicam
      HB_UPLOADS_ROOT: outputs/uploads
      HB_OLLAMA_URL: ${HB_OLLAMA_URL:-http://host.docker.internal:11434}
      # Use from inside containers (pipeline / scripts with mlflow enabled)
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    ports:
      - "8010:8010"
    volumes:
      - ./outputs:/app/outputs
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5)",
        ]
      interval: 15s
      timeout: 8s
      retries: 6
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: human-behaviour-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: hb-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.2.0
    container_name: hb-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  mlflow_db:
  mlflow_artifacts:
