version: '3.9'

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.1
    container_name: mlflow-server
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlflow.db:/mlflow/mlflow.db

  api:
    image: python:3.12-slim
    container_name: human-behaviour-api
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python -m uvicorn src.interface.api:app --host 0.0.0.0 --port 8010"
    environment:
      - HB_API_AUTH=false
      - HB_MULTICAM_ROOT=outputs/multicam
      - HB_UPLOADS_ROOT=outputs/uploads
    ports:
      - "8010:8010"
    depends_on:
      - mlflow
