global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring (Grafana can graph up{job="prometheus"})
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI exposes /metrics (see src/interface/api.py)
  - job_name: "human-behaviour-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8010"]

  # MLflow tracking server does not expose a Prometheus /metrics endpoint by default.
  # Use the MLflow UI at http://localhost:5000 for experiments and artifacts.
